<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Pets: Gelişmiş Duygu Dünyası</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 10px;
        }
        #gameContainer {
            background: #1e293b;
            border: 3px solid #334155;
            border-radius: 20px;
            width: 100%;
            max-width: 480px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        #charSelector {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        .selector-btn {
            background: #334155;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .selector-btn.active {
            background: #a855f7;
            transform: scale(1.05);
        }
        #stage {
            background: #0f172a;
            border-radius: 16px;
            height: 220px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid #475569;
        }
        #charImage {
            height: 120px;
            object-fit: contain;
            transition: transform 0.3s ease;
            margin-top: 20px;
        }
        /* Canlı Tepki Animasyonları */
        .bounce { animation: bounceAnim 0.5s ease infinite alternate; }
        .shake { animation: shakeAnim 0.4s ease; }
        .scared { animation: scareAnim 0.3s ease infinite; }
        .spin { animation: spinAnim 0.5s ease; }
        .angry { animation: angryAnim 0.2s ease infinite; }
        
        @keyframes bounceAnim { 0% { transform: translateY(0); } 100% { transform: translateY(-15px); } }
        @keyframes shakeAnim { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px) rotate(-3deg); } 75% { transform: translateX(8px) rotate(3deg); } }
        @keyframes scareAnim { 0%, 100% { transform: scale(1); } 50% { transform: scale(0.92) translateY(4px); } }
        @keyframes spinAnim { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.2); } 100% { transform: rotate(360deg) scale(1); } }
        @keyframes angryAnim { 0%, 100% { transform: translateX(0) translateY(0); } 25% { transform: translateX(-3px) translateY(-2px); } 75% { transform: translateX(3px) translateY(2px); } }

        #bubble {
            position: absolute;
            top: 10px;
            background: white;
            color: black;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            max-width: 85%;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 2;
        }
        #bubble::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 6px 6px 0;
            border-style: solid;
            border-color: white transparent;
        }
        .status-container {
            background: #141b2d;
            padding: 8px 12px;
            border-radius: 12px;
        }
        .bar-bg {
            background: #334155;
            width: 100%;
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 4px;
        }
        #happinessBar {
            background: linear-gradient(90deg, #ef4444, #eab308, #22c55e);
            width: 80%;
            height: 100%;
            transition: width 0.4s ease;
        }
        .section-title {
            font-size: 12px;
            font-weight: bold;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }
        #actionGrid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }
        #questionGrid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }
        .game-btn {
            color: white;
            border: none;
            padding: 10px 4px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            transition: background 0.2s, transform 0.1s;
        }
        .game-btn:active { transform: scale(0.95); }
        .action-btn { background: #2563eb; padding: 8px 2px; }
        .action-btn:hover { background: #1d4ed8; }
        .question-btn { background: #059669; font-size: 11px; padding: 8px 4px; }
        .question-btn:hover { background: #047857; }
    </style>
</head>

<div id="gameContainer">
    <!-- Üst Karakter Değiştirme Menüsü -->

    <div class="section-title">💬 Karakterle Konuş (6 Soru)</div>
    <div id="questionGrid">

        <button class="game-btn question-btn" onclick="askQuestion('dislikes')">❌ Neleri Sevmezsin?</button>

let currentId = "sugar";
let happiness = 80;
let conversationTimeout;

const bubble = document.getElementById("bubble");
const charImage = document.getElementById("charImage");
const happinessBar = document.getElementById("happinessBar");
const percentageLabel = document.getElementById("percentageLabel");
const moodLabel = document.getElementById("moodLabel");

function selectCharacter(id) {
    currentId = id;
    happiness = 80;
    clearTimeout(conversationTimeout);
    
    document.querySelectorAll('.selector-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    
    const char = characters[id];
    charImage.src = char.image;
    
    resetAnimationAndIdle(char);
    updateUi();
}

function askQuestion(qType) {
    const char = characters[currentId];
    clearTimeout(conversationTimeout);
    
    charImage.className = "";
    if (char.personality.includes("Şapşal") || char.personality.includes("Neşeli")) {
        charImage.classList.add("bounce");
    } else if (char.personality.includes("Utangaç")) {
        charImage.classList.add("scared");
    } else if (currentId === "gus") {
        charImage.classList.add("angry");
    } else if (currentId === "dot") {
        charImage.classList.add("spin");
    }

    if (qType === 'likes') bubble.innerText = char.qLikes;
    if (qType === 'dislikes') bubble.innerText = char.qDislikes;
    if (qType === 'favOne') bubble.innerText = char.qFavOne;
    if (qType === 'hateOne') bubble.innerText = char.qHateOne;
    if (qType === 'bestFriend') bubble.innerText = char.qFriend;
    if (qType === 'intro') bubble.innerText = char.qIntro;

    conversationTimeout = setTimeout(() => {
        resetAnimationAndIdle(char);
    }, 6000);
}

function giveItem(itemType) {
    const char = characters[currentId];
    clearTimeout(conversationTimeout);
    charImage.className = ""; 
    
    const response = char.responses[itemType];
    
    if (response) {
        bubble.innerText = response.text;
        charImage.classList.add(response.anim);
        
        if (response.status === "like") {
            happiness = Math.min(100, happiness + 15);
        } else {
            happiness = Math.max(0, happiness - 20);
        }
    } else {
        bubble.innerText = "Hmm, buna karşı nötrüm. 😐";
    }
    
    updateUi();
    
    conversationTimeout = setTimeout(() => {
        resetAnimationAndIdle(char);
    }, 4000);
}

function resetAnimationAndIdle(char) {
    charImage.className = "";
    if (char.personality.includes("Şapşal") || char.personality.includes("Neşeli")) {
        charImage.classList.add("bounce");
    }
    bubble.innerText = char.msgIdle;
}

function updateUi() {
    happinessBar.style.width = happiness + "%";
    percentageLabel.innerText = "Mutluluk: " + happiness + "%";
    
    if (happiness > 75) moodLabel.innerText = "Duygu: Harika! 😍";
    else if (happiness > 40) moodLabel.innerText = "Duygu: Normal 🙂";
    else if (happiness > 15) moodLabel.innerText = "Duygu: Üzgün/Korkmuş 😢";
    else moodLabel.innerText = "Duygu: Bunalmış/Sinirli 🤬";
}

selectCharacter("sugar");
