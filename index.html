<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ThePets: Clean Edition</title>
    <style>
        :root { --panel: #ffffff; --bg: #d6e4f0; --accent: #5a67d8; --success: #48bb78; }
        body { 
            margin: 0; background: var(--bg); color: #4a5568; 
            font-family: sans-serif; 
            overflow: hidden; display: flex; flex-direction: column; align-items: center; 
            touch-action: none; user-select: none;
        }

        #ui { 
            width: 95%; max-width: 380px; display: flex; justify-content: space-between; align-items: center;
            padding: 15px; background: var(--panel); border-radius: 20px; 
            margin-top: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); z-index: 20;
        }
        #score { font-size: 32px; font-weight: 900; color: var(--accent); }

        #game-container { 
            position: relative; width: 360px; height: 460px; 
            margin-top: 15px; border-radius: 25px; background: rgba(255,255,255,0.4);
            overflow: hidden; border: 4px solid white;
        }

        #shop { width: 95%; max-width: 380px; display: flex; gap: 12px; margin-top: 15px; }
        .ability-btn {
            flex: 1; padding: 12px; border-radius: 15px; border: none; background: white;
            font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            transition: 0.2s; color: var(--accent);
        }
        .btn-label { font-size: 9px; color: var(--success); font-weight: 800; }

        #hierarchy { 
            width: 95%; max-width: 400px; display: flex; gap: 8px; 
            margin-top: 20px; padding: 10px; background: rgba(255,255,255,0.2); 
            border-radius: 15px; overflow-x: auto;
        }
        .h-item img { width: 30px; height: 30px; border-radius: 50%; border: 2px solid white; }
    </style>
</head>
<body>

<div id="ui">
    <div class="stats">
        <div style="font-size: 10px; font-weight: bold; color: #a0aec0;">PUAN</div>
        <div id="score">0</div>
    </div>
    <div style="text-align: center;">
        <div style="font-size: 10px; font-weight: bold; margin-bottom: 2px;">SIRADAKİ</div>
        <img id="next-img" src="" width="45" height="45" style="border-radius:50%; border:2px solid white; background: white;">
    </div>
</div>

<div id="game-container">
    <canvas id="game-canvas"></canvas>
</div>

<div id="shop">
    <button class="ability-btn" onclick="applyPower('undo')">
        <span>↩️ GERİ AL</span>
        <span class="btn-label">BEDAVA</span>
    </button>
    <button class="ability-btn" onclick="applyPower('shake')">
        <span>📳 SALLA</span>
        <span class="btn-label">BEDAVA</span>
    </button>
</div>

<div id="hierarchy"></div>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 360; canvas.height = 460;

    const PET_LIST = ["pinky", "dinory", "sleapy", "stary", "browny", "sunny", "flip", "dot", "gus", "sugar", "blinky", "squeak"];
    const RAW_URL = "https://raw.githubusercontent.com/darwin456222-ops/Darwiizl/main/";

    const PET_DATA = PET_LIST.map((name, i) => {
        const img = new Image();
        img.src = RAW_URL + name + ".jpg";
        return { name, r: 15 + (i * 7), img };
    });

    const hBox = document.getElementById('hierarchy');
    PET_DATA.forEach(p => {
        const div = document.createElement('div');
        div.innerHTML = `<img src="${RAW_URL + p.name + '.jpg'}">`;
        hBox.appendChild(div);
    });

    let score = 0, items = [], steps = [], isReady = true, mouseX = 180, smoothX = 180;
    let currLvl = 0, nextLvl = 1;

    function updateUI() {
        document.getElementById('score').innerText = score;
        document.getElementById('next-img').src = RAW_URL + PET_DATA[nextLvl].name + ".jpg";
    }

    function applyPower(type) {
        if (type === 'undo' && steps.length > 0) {
            items = JSON.parse(steps.pop()).map(p => {
                let np = new Pet(p.x, p.y, p.level);
                np.vx = p.vx; np.vy = p.vy; return np;
            });
        } else if (type === 'shake') {
            items.forEach(p => { p.vx += (Math.random()-0.5)*30; p.vy -= 15; });
        }
        updateUI();
    }

    class Pet {
        constructor(x, y, level, isStatic = false) {
            this.x = x; this.y = y; this.level = level;
            this.r = PET_DATA[level].r; this.vx = 0; this.vy = 0; this.isStatic = isStatic;
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.isStatic ? 0.5 : 1;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.clip();
            try {
                ctx.drawImage(PET_DATA[this.level].img, this.x - this.r, this.y - this.r, this.r * 2, this.r * 2);
            } catch(e) {}
            ctx.restore();
            ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();
        }
        update() {
            if(this.isStatic) return;
            this.vy += 0.8; this.x += this.vx; this.y += this.vy;
            if (this.x < this.r) { this.x = this.r; this.vx *= -0.4; }
            if (this.x > 360 - this.r) { this.x = 360 - this.r; this.vx *= -0.4; }
            if (this.y > 460 - this.r) { this.y = 460 - this.r; this.vy *= -0.2; this.vx *= 0.8; }
        }
    }

    function checkPhysics() {
        for(let i=0; i<items.length; i++) {
            for(let j=i+1; j<items.length; j++) {
                let p1 = items[i], p2 = items[j];
                let dist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
                if(dist < p1.r + p2.r) {
                    if(p1.level === p2.level) {
                        let nl = (p1.level >= PET_LIST.length - 1) ? p1.level : p1.level + 1;
                        if(p1.level < PET_LIST.length - 1) {
                            items.splice(j, 1); items.splice(i, 1);
                            items.push(new Pet((p1.x+p2.x)/2, (p1.y+p2.y)/2, nl));
                            score += (nl + 1) * 5;
                        }
                        updateUI(); return;
                    }
                    let angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
                    let overlap = (p1.r + p2.r) - dist;
                    p1.x -= Math.cos(angle) * overlap * 0.3; p1.y -= Math.sin(angle) * overlap * 0.3;
                    p2.x += Math.cos(angle) * overlap * 0.3; p2.y += Math.sin(angle) * overlap * 0.3;
                }
            }
        }
    }

    canvas.addEventListener('mousedown', drop);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); drop(); });

    function drop() {
        if(!isReady) return;
        steps.push(JSON.stringify(items.map(p => ({x:p.x, y:p.y, level:p.level, vx:p.vx, vy:p.vy}))));
        if(steps.length > 5) steps.shift();
        items.push(new Pet(smoothX, 40, currLvl));
        isReady = false;
        setTimeout(() => { currLvl = nextLvl; nextLvl = Math.floor(Math.random()*3); isReady = true; updateUI(); }, 600);
    }

    function loop() {
        ctx.clearRect(0,0,360,460);
        const r = canvas.getBoundingClientRect();
        
        canvas.onmousemove = (e) => { mouseX = e.clientX - r.left; };
        canvas.ontouchmove = (e) => { mouseX = e.touches[0].clientX - r.left; };

        let limit = PET_DATA[currLvl].r;
        if (mouseX < limit) mouseX = limit; if (mouseX > 360 - limit) mouseX = 360 - limit;
        smoothX += (mouseX - smoothX) * 0.15;

        if(isReady) new Pet(smoothX, 40, currLvl, true).draw();
        checkPhysics();
        items.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(loop);
    }
    updateUI(); loop();
</script>
</body>
</html>
