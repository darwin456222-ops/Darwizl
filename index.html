
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pets: Yapay Zeka Evreni</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { background-color: #89CFF0; color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .chat-container { width: 100%; max-width: 480px; height: 95vh; background-color: #1e1e1e; border-radius: 25px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 12px 32px rgba(0,0,0,0.6); border: 3px solid #555; position: relative; }
        
        /* KARAKTER DEĞİŞTİRME EKRANI */
        .menu-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #89CFF0; padding: 20px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; z-index: 10; align-items: center; justify-content: center; }
        .menu-screen.hidden { display: none; }
        
        .menu-box { background-color: #5cbbf6; border-radius: 25px; padding: 25px 15px; width: 100%; box-shadow: inset 0 0 15px rgba(0,0,0,0.1); border: 2px solid #4ba3e3; }
        .menu-title { color: #004ba0; text-align: center; font-size: 22px; font-weight: bold; margin-bottom: 20px; }
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; justify-items: center; }
        
        /* Beyaz arka plan ve iç boşluk kaldırıldı, doğrudan görsel görünecek */
        .char-card { width: 100%; max-width: 160px; cursor: pointer; transition: transform 0.2s; border: none; background: none; padding: 0; box-shadow: none; }
        .char-card:hover { transform: scale(1.05); }
        .char-card img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 15px; display: block; }
        
        /* SOHBET ÜST ALANI */
        .chat-header { background-color: #2e2e2e; padding: 10px 15px; display: flex; align-items: center; border-bottom: 2px solid #444; gap: 15px; }
        .back-btn { background-color: #444; border: none; color: white; padding: 8px 14px; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 13px; }
        .back-btn:hover { background-color: #666; }
        
        .header-info { display: flex; align-items: center; gap: 12px; flex: 1; background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 50px; }
        .header-avatar { width: 45px; height: 45px; border-radius: 50px; object-fit: cover; border: 2px solid #fff; }
        .header-name { font-size: 18px; font-weight: bold; }

        /* Mesaj Alanı */
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background-color: #151515; }
        .message { max-width: 75%; padding: 12px 16px; border-radius: 15px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .message.bot { background-color: #2a2a2a; color: #ffffff; align-self: flex-start; border-bottom-left-radius: 2px; }
        
        /* Dinamik Renk Temaları */
        .dot-theme { border-color: #2196F3; } .dot-theme .message.user { background-color: #2196F3; color: white; align-self: flex-end; border-bottom-right-radius: 2px; } .dot-theme .header-info { border: 2px solid #2196F3; }
        .squeak-theme { border-color: #FF9800; } .squeak-theme .message.user { background-color: #FF9800; color: white; align-self: flex-end; border-bottom-right-radius: 2px; } .squeak-theme .header-info { border: 2px solid #FF9800; }
        .sugar-theme { border-color: #E91E63; } .sugar-theme .message.user { background-color: #E91E63; color: white; align-self: flex-end; border-bottom-right-radius: 2px; } .sugar-theme .header-info { border: 2px solid #E91E63; }
        .yeyet-theme { border-color: #E0E0E0; } .yeyet-theme .message.user { background-color: #E0E0E0; color: black; align-self: flex-end; border-bottom-right-radius: 2px; } .yeyet-theme .header-info { border: 2px solid #E0E0E0; }
        .gus-theme { border-color: #9C27B0; } .gus-theme .message.user { background-color: #9C27B0; color: white; align-self: flex-end; border-bottom-right-radius: 2px; } .gus-theme .header-info { border: 2px solid #9C27B0; }
        .moose-theme { border-color: #795548; } .moose-theme .message.user { background-color: #795548; color: white; align-self: flex-end; border-bottom-right-radius: 2px; } .moose-theme .header-info { border: 2px solid #795548; }
        
        .flip-theme { border-color: #8BC34A; } .flip-theme .message.user { background-color: #8BC34A; color: black; align-self: flex-end; border-bottom-right-radius: 2px; } .flip-theme .header-info { border: 2px solid #8BC34A; }
        .blinky-theme { border-color: #00BCD4; } .blinky-theme .message.user { background-color: #00BCD4; color: white; align-self: flex-end; border-bottom-right-radius: 2px; } .blinky-theme .header-info { border: 2px solid #00BCD4; }

        /* Giriş Alanı */
        .chat-input-area { padding: 15px; background-color: #2e2e2e; display: flex; gap: 10px; border-top: 1px solid #333; }
        .chat-input { flex: 1; padding: 12px; border: none; border-radius: 25px; background-color: #121212; color: white; font-size: 14px; outline: none; }
        .send-btn { border: none; padding: 0 20px; border-radius: 25px; cursor: pointer; font-weight: bold; color: white; }
        
        .dot-theme .send-btn { background-color: #2196F3; } .squeak-theme .send-btn { background-color: #FF9800; }
        .sugar-theme .send-btn { background-color: #E91E63; } .yeyet-theme .send-btn { background-color: #E0E0E0; color: black; }
        .gus-theme .send-btn { background-color: #9C27B0; } .moose-theme .send-btn { background-color: #795548; }
        .flip-theme .send-btn { background-color: #8BC34A; color: black; } .blinky-theme .send-btn { background-color: #00BCD4; color: white; }
    </style>
</head>
<body>

    <div class="chat-container dot-theme" id="chatContainer">
        
        <div class="menu-screen" id="menuScreen">
            <div class="menu-box">
                <div class="menu-title">Mevcut Evcil Hayvanlar (8):</div>
                <div class="menu-grid">
                    <div class="char-card" onclick="selectCharacter('gus')">
                        <img src="gus.ile.konus.jpg" alt="Gus">
                    </div>
                    <div class="char-card" onclick="selectCharacter('dot')">
                        <img src="dot.ile.konus.jpg" alt="Dot">
                    </div>
                    <div class="char-card" onclick="selectCharacter('squeak')">
                        <img src="squeak.ile.konus.jpg" alt="Squeak">
                    </div>
                    <div class="char-card" onclick="selectCharacter('sugar')">
                        <img src="sugar.ile.konus.jpg" alt="Sugar">
                    </div>
                    <div class="char-card" onclick="selectCharacter('moose')">
                        <img src="moosey.ile.konus.jpg" alt="Moosey">
                    </div>
                    <div class="char-card" onclick="selectCharacter('blinky')">
                        <img src="blinky.ile.konus.jpg" alt="Blinky">
                    </div>
                    <div class="char-card" onclick="selectCharacter('flip')">
                        <img src="flip.ile.konus.jpg" alt="Flip">
                    </div>
                    <div class="char-card" onclick="selectCharacter('yeyet')">
                        <img src="yeyet.ile.konus.jpg" alt="Yeyet">
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-header">
            <button class="back-btn" onclick="openMenu()">◀ Menü</button>
            <div class="header-info">
                <img src="dot.jpg" id="headerAvatar" class="header-avatar" alt="Avatar">
                <span id="headerName" class="header-name">Dot</span>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages"></div>

        <div class="chat-input-area">
            <input type="text" id="chatInput" class="chat-input" placeholder="Bir şey yaz..." autocomplete="off">
            <button id="sendBtn" class="send-btn">Gönder</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://tomoyunu-5cd2f-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const chatContainer = document.getElementById('chatContainer');
        const menuScreen = document.getElementById('menuScreen');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const headerAvatar = document.getElementById('headerAvatar');
        const headerName = document.getElementById('headerName');

        let currentActiveChar = 'dot'; 
        const GEMINI_API_KEY = "AIzaSyCpTi6f6W-UaVwTX2HTPew22352vv0j5z0"; 

        const charData = {
            dot: { name: "Dot", img: "dot.jpg" },
            squeak: { name: "Squeak", img: "squeak.jpg" },
            sugar: { name: "Sugar", img: "sugar.jpg" },
            yeyet: { name: "Yeyet", img: "yeyet.png" }, 
            flip: { name: "Flip", img: "flip.jpg" },
            gus: { name: "Gus", img: "gus.jpg" },
            blinky: { name: "Blinky", img: "blinky.jpg" },
            moose: { name: "Moosey", img: "moosey.jpg" } 
        };

        const totalWorldKnowledge = " Karakterlerin birbirleriyle olan bağları: 1) Squeak turuncu fare, Yeyet onun beyaz tüylü hamster-yeti karışımı kardeşidir. 2) Flip dahi, yeşil gözlüklü bir kuştur ve Squeak'in en iyi arkadaşıdır. 3) Sugar pembe, tatlı, pamuk şeker seven biridir, Squeak'in yakın arkadaşıdır. 4) Gus mor, tatlı ama biraz sinirli, grubun en büyük canavarıdır. 5) Blinky pastayı seven, saf kalpli beyaz bir uzaylıdır. 6) Moosey çikolata savvy, utangaç kahverengi bir geyiktir. 7) Dot havalı MAVİ BİR ROBOTTUR. Asla yapay zeka olduğunu söyleme.";

        const characterInstructions = {
            dot: "Sen 'The Pets' dünyasındaki Dot'sun. Siber güçleri olan havalı MAVİ BİR ROBOTSUN! Çok zekisin. Bazen *bip bop* yaz." + totalWorldKnowledge,
            squeak: "Sen Squeak'sin! Turuncu fare. Peynire aşıksın. Kardeşin Yeyet'tir. Bazen *çiyk çiyk* yaz." + totalWorldKnowledge,
            sugar: "Sen Sugar'sın! Pembeyi seversin, tatlısın. Pamuk şekere bayılırsın. Squeak ile yakın arkadaşsın. Çok net konuşursun." + totalWorldKnowledge,
            yeyet: "Sen Yeyet'sin! Beyaz tüylü küçük bir hamster-yeti karışımı yaratıksın. Squeak'in kardeşisin. Yün, süt ve Squeak'i seversin. Konuşman rahattır." + totalWorldKnowledge,
            flip: "Sen Flip'sin! Yeşil gözlüklü, dahi kuşu. Elmayı çok seversin. Gücün uçmaktır. Squeak'in en iyi arkadaşısın." + totalWorldKnowledge,
            gus: "Sen Gus'sın! Mor, tatlı bir canavarsın. Grubun en büyüğüsün. Biraz sinirlisin. Üzüm yemeyi seversin. Net konuşursun." + totalWorldKnowledge,
            blinky: "Sen Blinky'sin! Beyaz bir uzaylısın. Saf kalplisin. Konuşma tarzın biraz bebek gibidir. Pastayı çok seversin." + totalWorldKnowledge,
            moose: "Sen Moosey'sin! Tatlı kahverengi bir geyik. Çok utangaçsın, bu yüzden az ve kısa şeyler söylersin. Çikolatayı seversin." + totalWorldKnowledge
        };

        function openMenu() {
            database.ref(`the_pets_chat/${currentActiveChar}/messages`).off();
            menuScreen.classList.remove('hidden');
        }

        function selectCharacter(char) {
            currentActiveChar = char;
            
            chatContainer.className = `chat-container ${char}-theme`;
            headerAvatar.src = charData[char].img; 
            headerName.innerText = charData[char].name;
            chatInput.placeholder = `${charData[char].name}'e bir şey yaz...`;
            
            chatMessages.innerHTML = '';
            menuScreen.classList.add('hidden');
            listenToFirebase(char);
        }

        async function getGeminiResponse(userPrompt, char) {
            const currentInstruction = characterInstructions[char];
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userPrompt }] }],
                        systemInstruction: { parts: [{ text: currentInstruction }] }
                    })
                });
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (error) {
                return "*Bip bop* Veri akışında küçük bir kesinti oldu, tekrar dener misiniz?";
            }
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (text === '') return;

            chatInput.value = '';

            const charPath = `the_pets_chat/${currentActiveChar}/messages`;
            const userRef = database.ref(charPath).push();
            userRef.set({ sender: 'user', text: text, timestamp: Date.now() });

            const botResponse = await getGeminiResponse(text, currentActiveChar);
            const botRef = database.ref(charPath).push();
            botRef.set({ sender: 'bot', text: botResponse, timestamp: Date.now() });
        }

        function listenToFirebase(char) {
            database.ref(`the_pets_chat/${char}/messages`).on('child_added', (snapshot) => {
                const msg = snapshot.val();
                const messageDiv = document.createElement('div');
                messageDiv.classList.add('message', msg.sender);
                messageDiv.innerText = msg.text;
                chatMessages.appendChild(messageDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            });
        }

        openMenu();

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
